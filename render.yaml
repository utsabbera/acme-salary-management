services:
  - type: web
    name: acme-salary-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: uv sync --frozen
    startCommand: uv run alembic upgrade head && fastapi run main.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
